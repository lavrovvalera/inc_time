name: Sanitizers

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main

jobs:
  sanitizers:
    # Pinned to ubuntu-24.04 (not ubuntu-latest) — sanitizers require a stable
    # glibc/runtime version; avoids breakage when ubuntu-latest rolls forward.
    runs-on: ubuntu-24.04
    # Non-blocking until known sanitizer failures in the code are resolved.
    # Remove this line once the code is clean.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        config: [asan_ubsan_lsan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.config }}
          repository-cache: true
          cache-save: ${{ github.event_name == 'push' }}

      - name: Run tests with sanitizers
        # --lockfile_mode=error prevents MODULE.bazel.lock from being
        # silently regenerated in CI; consistent with other score modules.
        run: bazel test --lockfile_mode=error --config=${{ matrix.config }} --config=time-x86_64-linux //score/... --verbose_failures

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-${{ matrix.config }}-${{ github.run_id }}
          path: bazel-testlogs/
          retention-days: 7
