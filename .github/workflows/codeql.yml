name: QA / CodeQL

on:
  schedule:
    - cron: "0 2 * * *" # Nightly at 2 AM UTC
  workflow_dispatch:

jobs:
  codeql:
    uses: eclipse-score/cicd-workflows/.github/workflows/codeql.yml@main
    with:
      build-script: "bazel build --config=time-x86_64-linux //score/..."
    permissions:
      security-events: write
      contents: read
